<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-Eye Pro | AI Creative Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #7c5ce7;
    --primary-hover: #9b7ef2;
    --on-primary: #fff;
    --bg: #f5f6fa;
    --surface: #fff;
    --surface-alt: #f0f1f7;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --border: #e2e4eb;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-full: 999px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.02em;
  }
  .brand-dot {
    width: 8px; height: 8px;
    background: var(--primary);
    border-radius: 50%;
  }
  .header-nav {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .header-nav a, .header-nav button {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .header-nav a:hover, .header-nav button:hover { color: var(--primary); background: var(--surface-alt); }
  .header-nav a.active, .header-nav button.active { color: var(--primary); font-weight: 600; }
  .btn-outline {
    border: 1px solid var(--border) !important;
  }
  .btn-primary-sm {
    background: var(--primary) !important;
    color: var(--on-primary) !important;
    font-weight: 600 !important;
  }
  .btn-primary-sm:hover { background: var(--primary-hover) !important; }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface-alt);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    cursor: pointer;
    border: 1px solid var(--border);
  }

  /* ── Main Content ── */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Search Section ── */
  .search-section {
    padding: 32px 0 20px;
  }
  .search-bar {
    display: flex;
    gap: 12px;
    max-width: 720px;
  }
  .search-input {
    flex: 1;
    height: 48px;
    padding: 0 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    box-shadow: var(--shadow);
  }
  .search-input:focus { border-color: var(--primary); }
  .search-btn {
    height: 48px;
    padding: 0 28px;
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-btn:hover { background: var(--primary-hover); }

  .quick-filters {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 6px 16px;
    border-radius: var(--radius-full);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
  .filter-chip.active {
    background: var(--primary);
    color: var(--on-primary);
    border-color: var(--primary);
  }

  /* ── Tabs ── */
  .content-tabs {
    display: flex;
    gap: 24px;
    padding: 4px 0 12px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 24px;
  }
  .tab-item {
    padding: 8px 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    position: relative;
    border: none;
    background: none;
  }
  .tab-item.active { color: var(--primary); }
  .tab-item.active::after {
    content: '';
    position: absolute;
    bottom: -14px; left: 0; right: 0;
    height: 2px;
    background: var(--primary);
  }

  /* ── Video Grid ── */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
    padding-bottom: 60px;
  }
  @media (max-width: 860px) {
    .video-grid { grid-template-columns: 1fr; }
  }

  .video-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.2s;
    display: flex;
    flex-direction: column;
  }
  .video-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }

  .card-top {
    position: relative;
    aspect-ratio: 16/9;
    cursor: pointer;
    background: #eaeaea;
  }
  .card-top img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .score-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: var(--shadow);
  }
  .score-val { font-weight: 700; color: var(--primary); font-size: 20px; }
  .score-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }

  .budget-tag {
    position: absolute;
    bottom: 12px; left: 12px;
    background: rgba(0,0,0,0.65);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
  }

  .card-body { padding: 18px; }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .dim-scores {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .dim-item {
    flex: 1;
    text-align: center;
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    padding: 8px 6px;
  }
  .dim-item .dim-label { font-size: 10px; color: var(--text-secondary); margin-bottom: 2px; }
  .dim-item .dim-value { font-size: 16px; font-weight: 700; color: var(--primary); }

  .concept-box {
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 12px;
  }
  .concept-box .concept-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .concept-box .concept-value {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .concept-row {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .concept-row .item-label { font-size: 10px; color: var(--text-secondary); }
  .concept-row .item-value { font-size: 12px; font-weight: 600; margin-top: 2px; }

  .audit-preview {
    background: var(--surface-alt);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    border-left: 3px solid var(--primary);
    margin-bottom: 12px;
  }

  .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    background: var(--surface-alt);
    color: var(--primary);
    border-radius: var(--radius-full);
    border: 1px solid var(--border);
  }

  .card-actions {
    display: flex;
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    gap: 10px;
  }
  .action-btn {
    flex: 1;
    padding: 9px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }
  .action-btn:hover { border-color: var(--primary); color: var(--primary); }
  .action-btn.primary {
    background: var(--primary);
    color: var(--on-primary);
    border-color: var(--primary);
  }
  .action-btn.primary:hover { background: var(--primary-hover); }
  .action-btn.fav-active {
    color: #e74c3c;
    border-color: #e74c3c;
    background: #fef5f5;
  }

  /* ── Modals (standard centered) ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-dialog {
    background: var(--surface);
    border-radius: var(--radius-lg);
    width: 440px;
    max-width: 92vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px;
    box-shadow: var(--shadow-lg);
    animation: fadeIn 0.15s ease-out;
  }
  .modal-dialog.wide { width: 760px; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

  .modal-header {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--text-secondary);
  }
  .modal-close:hover { background: var(--surface-alt); }

  .input-group { margin-bottom: 18px; }
  .input-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: block;
  }
  .modal-input {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .modal-input:focus { border-color: var(--primary); }

  .modal-btn {
    width: 100%;
    height: 46px;
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
  }
  .modal-btn:hover { background: var(--primary-hover); }

  /* ── Detail Report ── */
  .detail-scores-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .detail-score-item {
    flex: 1;
    text-align: center;
    background: var(--surface-alt);
    border-radius: var(--radius);
    padding: 14px 10px;
  }
  .detail-score-item .ds-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
  .detail-score-item .ds-value { font-size: 26px; font-weight: 700; color: var(--primary); }

  .detail-scenarios {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .detail-scenario-chip {
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    padding: 6px 14px;
    font-size: 12px;
    border: 1px solid var(--border);
  }
  .detail-scenario-chip .sc-label { color: var(--text-secondary); }
  .detail-scenario-chip .sc-value { font-weight: 700; color: var(--primary); margin-left: 6px; }

  .ecd-report-content { font-size: 14px; line-height: 1.7; color: var(--text); }
  .ecd-report-content h3 { font-size: 16px; color: var(--primary); margin: 22px 0 10px; }
  .ecd-report-content p { margin-bottom: 12px; }
  .ecd-report-content strong { color: var(--primary); }
  .ecd-report-content blockquote {
    background: var(--surface-alt);
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border-left: 4px solid var(--primary);
    margin: 16px 0;
  }

  /* ── L2 Metadata ── */
  .l2-section {
    background: var(--surface-alt);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .l2-section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .l2-section-title .l2-fallback-badge {
    font-size: 10px;
    background: #b8860b;
    color: #000;
    padding: 1px 6px;
    border-radius: var(--radius-full);
    font-weight: 600;
  }
  .l2-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .l2-chip {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: var(--radius-full);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }
  .l2-chip.primary { background: rgba(208,188,255,0.15); color: var(--primary); border-color: rgba(208,188,255,0.3); }
  .l2-chip.accent { background: rgba(123,208,255,0.12); color: var(--tertiary, #7bd0ff); border-color: rgba(123,208,255,0.25); }
  .l2-chip.warn  { background: rgba(255,180,0,0.12); color: #ffb400; border-color: rgba(255,180,0,0.25); }
  .l2-text-line {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .l2-text-line strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ── M2 模式识别 ── */
  .m2-quality-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    font-size: 12px;
  }
  .m2-quality-bar {
    flex: 1;
    height: 6px;
    background: var(--surface);
    border-radius: 3px;
    overflow: hidden;
  }
  .m2-quality-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .m2-quality-fill.high { background: #4ade80; }
  .m2-quality-fill.mid  { background: #facc15; }
  .m2-quality-fill.low  { background: #ef4444; }
  .m2-quality-val {
    font-weight: 700;
    font-size: 14px;
    color: var(--primary);
    min-width: 36px;
    text-align: right;
  }
  .m2-anomaly-flag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: var(--radius-full);
    margin-top: 6px;
  }
  .m2-anomaly-flag.ok     { background: rgba(74,222,128,0.1); color: #4ade80; }
  .m2-anomaly-flag.warn   { background: rgba(250,204,21,0.15); color: #facc15; }
  .m2-anomaly-flag.danger { background: rgba(239,68,68,0.15); color: #ef4444; }
  .m2-signals-text {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
    line-height: 1.5;
  }

  /* ── Similar Works ── */
  .similar-section { margin-top: 20px; }
  .similar-section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .similar-list { display: flex; flex-direction: column; gap: 8px; }
  .similar-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border 0.15s;
  }
  .similar-card:hover { border-color: var(--primary); }
  .similar-cover {
    width: 48px; height: 32px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--surface);
    flex-shrink: 0;
  }
  .similar-info { flex: 1; min-width: 0; }
  .similar-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .similar-meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .similar-score {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    flex-shrink: 0;
    padding: 2px 8px;
    background: rgba(208,188,255,0.1);
    border-radius: var(--radius-full);
  }

  /* ── M6 Synthesis ── */
  .synthesis-section {
    margin-top: 20px;
    background: linear-gradient(135deg, rgba(208,188,255,0.08), rgba(255,255,255,0.02));
    border: 1px solid rgba(208,188,255,0.2);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .synthesis-section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .synthesis-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 14px;
  }
  .synthesis-insights {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .synthesis-insight-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .synthesis-insight-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--primary);
    flex-shrink: 0;
    margin-top: 7px;
  }

  /* ── Creator Profile ── */
  .creator-section {
    background: var(--surface-alt);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .creator-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .creator-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .creator-tier-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: var(--radius-full);
  }
  .creator-tier-badge.head { background: rgba(208,188,255,0.2); color: var(--primary); }
  .creator-tier-badge.waist { background: rgba(123,208,255,0.15); color: var(--tertiary, #7bd0ff); }
  .creator-tier-badge.rising { background: rgba(74,222,128,0.12); color: #4ade80; }
  .creator-tier-badge.new { background: rgba(255,255,255,0.08); color: var(--text-secondary); }
  .creator-stats-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .creator-stats-row span { white-space: nowrap; }
  .creator-stats-row strong { color: var(--text); }
  .creator-insight {
    font-size: 12px;
    color: var(--primary);
    margin-top: 8px;
    padding: 8px 10px;
    background: rgba(208,188,255,0.06);
    border-radius: var(--radius-sm);
    line-height: 1.5;
  }

  /* ── Trend Banner ── */
  .trend-banner {
    background: rgba(123,208,255,0.08);
    border: 1px solid rgba(123,208,255,0.2);
    border-radius: var(--radius);
    padding: 10px 16px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .trend-banner .trend-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .trend-banner strong { color: var(--tertiary, #7bd0ff); }

  /* ── Empty State ── */
  .empty-state {
    grid-column: 1 / -1;
    padding: 80px 20px;
    text-align: center;
    color: var(--text-secondary);
  }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; }

  /* ── Loader ── */
  .loader {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Account Card ── */
  .account-card {
    background: var(--surface-alt);

</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let currentUser = null;
let allVideos = [];
let currentCategory = 'ALL';
let currentIndustry = '';
let isLoginMode = true;

// ── UI Helpers ──
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
}

// ── Navigation ──
document.getElementById('navHome').onclick = (e) => {
  e.preventDefault();
  setActiveNav('navHome');
  document.getElementById('homeSection').classList.add('active');
  document.getElementById('favSection').classList.remove('active');
};
document.getElementById('navFavs').onclick = (e) => {
  e.preventDefault();
  if (!currentUser) { openModal('authModal'); return; }
  setActiveNav('navFavs');
  document.getElementById('homeSection').classList.remove('active');
  document.getElementById('favSection').classList.add('active');
  loadFavorites();
};
document.getElementById('navAccount').onclick = (e) => {
  e.preventDefault();
  if (!currentUser) { openModal('authModal'); return; }
  updateAccountUI();
  openModal('accountModal');
};
document.getElementById('profileBtn').onclick = () => {
  if (!currentUser) openModal('authModal');
  else { updateAccountUI(); openModal('accountModal'); }
};

function setActiveNav(id) {
  document.querySelectorAll('.header-nav a').forEach(a => a.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Auth ──
async function checkAuth() {
  const resp = await fetch('/api/me');
  const data = await resp.json();
  if (data.authenticated) { currentUser = data; updateAccountUI(); }
}
function updateAccountUI() {
  if (currentUser) {
    document.getElementById('dispUser').textContent = currentUser.username;
    document.getElementById('dispRole').textContent = currentUser.is_member ? 'PRO LICENSE' : 'STANDARD ACCESS';
    document.getElementById('upgradeSection').style.display = currentUser.is_member ? 'none' : 'block';
  }
}

document.getElementById('switchAuth').onclick = () => {
  isLoginMode = !isLoginMode;
  document.getElementById('authTitle').textContent = isLoginMode ? '登录' : '注册';
  document.getElementById('btnAuthSubmit').textContent = isLoginMode ? '登录' : '注册';
  document.getElementById('switchAuth').textContent = isLoginMode ? '立即注册' : '返回登录';
};

document.getElementById('btnAuthSubmit').onclick = async () => {
  const username = document.getElementById('authUsername').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  if (!username || !password) return;
  const url = isLoginMode ? '/api/login' : '/api/register';
  const resp = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password})
  });
  const data = await resp.json();
  if (data.error) { alert(data.error); }
  else {
    if (!isLoginMode) { alert('注册成功，请登录'); isLoginMode = true; document.getElementById('switchAuth').click(); }
    else { location.reload(); }
  }
};

document.getElementById('btnLogout').onclick = async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.reload();
};
document.getElementById('btnUpgrade').onclick = async () => {
  const resp = await fetch('/api/upgrade', { method: 'POST' });
  alert((await resp.json()).message);
  location.reload();
};

// ── Search & Filters ──
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentIndustry = chip.dataset.industry;
    if (document.getElementById('searchKw').value.trim()) {
      document.getElementById('btnSearch').click();
    }
  };
});

document.querySelectorAll('.tab-item').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCategory = tab.dataset.category;
    renderVideos();
  };
});

document.getElementById('btnSearch').onclick = async () => {
  const kw = document.getElementById('searchKw').value.trim();
  if (!kw && !currentIndustry) return;
  if (!currentUser) { openModal('authModal'); return; }

  const list = document.getElementById('videoList');
  list.innerHTML = `<div class="empty-state"><div class="loader"></div><p style="margin-top:16px;">L1 引擎分析中...</p></div>`;

  try {
    const params = new URLSearchParams({ kw, industry: currentIndustry });
    const resp = await fetch('/api/search?' + params);
    const data = await resp.json();
    if (data.error) {
      list.innerHTML = `<div class="empty-state"><h3>审计中断</h3><p>${data.error}</p></div>`;
    } else {
      allVideos = data.videos;
      document.getElementById('categoryTabs').style.display = 'flex';
      renderTrendBanner(data.trends);
      renderVideos();
    }
  } catch (err) {
    list.innerHTML = `<div class="empty-state"><h3>系统异常</h3><p>${err.message}</p></div>`;
  }
};

// ── Video Card ──
function buildVideoCard(v) {
  const isFav = v.is_favorite;
  const auditText = v.summary || '正在提取创意指纹...';
  const d = v.dimensions || {};
  const overall = v.overall || v.reference_score || 0;
  const D1 = v.D1 || (v.scores && v.scores.D1) || 0;
  const D2 = v.D2 || (v.scores && v.scores.D2) || 0;
  const D3 = v.D3 || (v.scores && v.scores.D3) || 0;
  const D4 = v.D4 || (v.scores && v.scores.D4) || 0;
  const playUrl = v.web_url || `https://www.xinpianchang.com/a${v.id}`;

  return `
    <div class="video-card">
      <div class="card-top" onclick="window.open('${playUrl}', '_blank')">
        <img src="${v.cover}?x-oss-process=image/resize,w_800" alt="${v.title}" loading="lazy">
        <div class="score-badge">
          <span class="score-label">综合</span>
          <span class="score-val">${overall}</span>
        </div>
        <div class="budget-tag">${d.budget || 'B级'}</div>
      </div>
      <div class="card-body">
        <h3 class="card-title">${v.title}</h3>
        <div class="dim-scores">
          <div class="dim-item"><div class="dim-label">观众</div><div class="dim-value">${D1}</div></div>
          <div class="dim-item"><div class="dim-label">商业</div><div class="dim-value">${D2}</div></div>
          <div class="dim-item"><div class="dim-label">团队</div><div class="dim-value">${D3}</div></div>
          <div class="dim-item"><div class="dim-label">新鲜</div><div class="dim-value">${D4}</div></div>
        </div>
        <div class="concept-box">
          <div class="concept-title">资产沉淀 / Concept Asset</div>
          <div class="concept-value">${d.concept_asset || '通用商业叙事'}</div>
          <div class="concept-row">
            <div>
              <div class="item-label">叙事效率 / Hook</div>
              <div class="item-value">${d.efficiency?.hook || '标准'}</div>
            </div>
            <div style="text-align:right;">
              <div class="item-label">核心主创 / Soul</div>
              <div class="item-value">${d.soul || '导演组'}</div>
            </div>
          </div>
        </div>
        <div class="audit-preview">${v.l2_audit ? '✨ ' : ''}${auditText}</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
          <div class="tag-cloud">
            ${(d.synesthesia || []).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <div style="font-size:11px; color:var(--text-secondary);">${d.efficiency?.platform || ''}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="action-btn ${isFav ? 'fav-active' : ''}" onclick="toggleFav('${v.id}')">
          ${isFav ? '★ 已收藏' : '☆ 收藏'}
        </button>
        <button class="action-btn primary" onclick="viewDetail('${v.id}')">深度审计报告</button>
      </div>
    </div>
  `;
}

function renderVideos() {
  const filtered = currentCategory === 'ALL'
    ? allVideos
    : allVideos.filter(v => v.tab_category === currentCategory);
  const list = document.getElementById('videoList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><h3>暂无此类案例</h3><p>尝试切换分类或调整搜索词</p></div>`;
  } else {
    list.innerHTML = filtered.map(buildVideoCard).join('');
  }
}

// ── Detail ──
async function viewDetail(id) {
  if (!currentUser) { openModal('authModal'); return; }
  if (!currentUser.is_member) {
    alert('深度审计报告 (L2级) 为 Pro 专属功能，请升级后查看。');
    openModal('accountModal');
    return;
  }

  const video = allVideos.find(v => v.id == id);
  if (!video) return;

  document.getElementById('detailTitle').textContent = `审计: ${video.title}`;
  document.getElementById('playLink').href = video.web_url || `https://www.xinpianchang.com/a${id}`;
  openModal('detailModal');
  document.getElementById('detailLoading').style.display = 'block';
  document.getElementById('detailContent').style.display = 'none';

  try {
    const params = new URLSearchParams({ id, industry: currentIndustry });
    const resp = await fetch('/api/evaluate?' + params);
    const data = await resp.json();
    if (data.error) { alert(data.error); closeModals(); }
    else {
      const sc = data.score_details || data.scores || {};
      document.getElementById('sD1').textContent = (sc.D1_audience_reception?.score || sc.D1 || '-');
      document.getElementById('sD2').textContent = (sc.D2_commercial_value?.score || sc.D2 || '-');
      document.getElementById('sD3').textContent = (sc.D3_team_professionalism?.score || sc.D3 || '-');
      document.getElementById('sD4').textContent = (sc.D4_freshness?.score || sc.D4 || '-');

      const scLabels = { default: '通用', advertiser: '广告商', creator_learning: '创作学习', latest_discovery: '最新发现' };
      const scenarios = data.scenarios || {};
      document.getElementById('detailScenarios').innerHTML = Object.entries(scenarios).map(([k, v]) =>
        `<div class="detail-scenario-chip"><span class="sc-label">${scLabels[k]||k}</span><span class="sc-value">${v}</span></div>`
      ).join('');

      renderL2Metadata(data.l2_metadata, data.m2_results);
      renderCreatorProfile(data.creator_profile);
      renderSimilarWorks(data.similar_works);
      renderSynthesis(data.synthesis);
      document.getElementById('ecdReport').innerHTML = marked.parse(data.ecd_report || '暂无审计报告');
      document.getElementById('detailLoading').style.display = 'none';
      document.getElementById('detailContent').style.display = 'block';
    }
  } catch (err) {
    alert('审计失败: ' + err.message);
    closeModals();
  }
}

function renderL2Metadata(l2, m2) {
  const section = document.getElementById('l2Section');
  if (!l2) { section.style.display = 'none'; return; }
  section.style.display = 'block';

  // Title with fallback indicator
  const title = document.getElementById('l2Title');
  if (l2._fallback) {
    title.innerHTML = `L2 AI 预分析 <span class="l2-fallback-badge">本地规则</span>`;
  } else {
    title.textContent = 'L2 AI 预分析';
  }

  // Meta chips row: brand, tier, industry, commercial type, budget, engagement
  const chips = [];
  if (l2.brand) chips.push(`<span class="l2-chip primary">${escHtml(l2.brand)}</span>`);
  if (l2.brand_tier && l2.brand_tier !== 'unknown') chips.push(`<span class="l2-chip">${escHtml(l2.brand_tier)}</span>`);
  if (l2.industry) chips.push(`<span class="l2-chip">${escHtml(l2.industry)}</span>`);
  if (l2.commercial_type && l2.commercial_type !== '其他') chips.push(`<span class="l2-chip accent">${escHtml(l2.commercial_type)}</span>`);
  if (l2.budget_tier) chips.push(`<span class="l2-chip warn">${escHtml(l2.budget_tier)}</span>`);
  if (l2.engagement_type) {
    const conf = l2.engagement_confidence != null ? ` ${Math.round(l2.engagement_confidence * 100)}%` : '';
    chips.push(`<span class="l2-chip accent">${escHtml(l2.engagement_type)}${conf}</span>`);
  }
  document.getElementById('l2MetaRow').innerHTML = chips.join('');

  // Style line
  const styleLine = document.getElementById('l2StyleLine');
  if (l2.visual_style) {
    styleLine.innerHTML = `<strong>视觉风格:</strong> ${escHtml(l2.visual_style)}`;
    styleLine.style.display = '';
  } else {
    styleLine.style.display = 'none';
  }

  // Mood line
  const moodLine = document.getElementById('l2MoodLine');
  if (l2.mood && l2.mood !== '未识别') {
    const extras = [];
    if (l2.target_audience) extras.push(`目标: ${escHtml(l2.target_audience)}`);
    if (l2.creator_specialty) extras.push(`导演专长: ${escHtml(l2.creator_specialty)}`);
    moodLine.innerHTML = `<strong>情绪基调:</strong> ${escHtml(l2.mood)}${extras.length ? ' &nbsp;|&nbsp; ' + extras.join(' &nbsp;|&nbsp; ') : ''}`;
    moodLine.style.display = '';
  } else {
    moodLine.style.display = 'none';
  }

  // Keyword chips row
  const kwRow = document.getElementById('l2KeywordRow');
  const allKw = [
    ...(l2.style_keywords || []).map(k => `<span class="l2-chip primary">${escHtml(k)}</span>`),
    ...(l2.mood_keywords || []).map(k => `<span class="l2-chip">${escHtml(k)}</span>`),
    ...(l2.tech_features || []).map(k => `<span class="l2-chip accent">${escHtml(k)}</span>`),
  ];
  kwRow.innerHTML = allKw.join('');
  kwRow.style.display = allKw.length ? '' : 'none';

  // ── M2 模式识别 ──
  renderM2Results(m2);
}

function renderM2Results(m2) {
  if (!m2) {
    document.getElementById('m2QualityWrap').style.display = 'none';
    document.getElementById('m2AnomalyFlag').style.display = 'none';
    document.getElementById('m2SignalsText').style.display = 'none';
    return;
  }

  // Quality prediction bar
  const qp = m2.quality_prediction;
  if (qp && qp.predicted_score !== undefined) {
    const wrap = document.getElementById('m2QualityWrap');
    wrap.style.display = 'flex';
    const fill = document.getElementById('m2QualityFill');
    const pct = Math.round(qp.predicted_score * 10);
    fill.style.width = pct + '%';
    fill.className = 'm2-quality-fill ' + (qp.predicted_score >= 7.5 ? 'high' : qp.predicted_score >= 5 ? 'mid' : 'low');
    document.getElementById('m2QualityVal').textContent = qp.predicted_score.toFixed(1);
  } else {
    document.getElementById('m2QualityWrap').style.display = 'none';
  }

  // Engagement signals text
  const eng = m2.engagement;
  const sigEl = document.getElementById('m2SignalsText');
  if (eng && eng.signals && eng.signals.length) {
    sigEl.textContent = eng.signals.join(' · ');
    sigEl.style.display = '';
  } else {
    sigEl.style.display = 'none';
  }

  // Anomaly flag
  const anom = m2.anomaly;
  const flagEl = document.getElementById('m2AnomalyFlag');
  if (anom) {
    if (anom.is_suspicious) {
      flagEl.innerHTML = '&#9888; 异常检测: ' + anom.flags.map(f => escHtml(f)).join('; ');
      flagEl.className = 'm2-anomaly-flag danger';
      flagEl.style.display = '';
    } else if (anom.score > 0.15) {
      flagEl.innerHTML = '&#9888; 异常检测: 需关注 (' + anom.flags.map(f => escHtml(f)).join('; ') + ')';
      flagEl.className = 'm2-anomaly-flag warn';
      flagEl.style.display = '';
    } else {
      flagEl.innerHTML = '&#10003; 数据正常';
      flagEl.className = 'm2-anomaly-flag ok';
      flagEl.style.display = '';
    }
  } else {
    flagEl.style.display = 'none';
  }
}

function renderCreatorProfile(profile) {
  const section = document.getElementById('creatorSection');
  if (!profile || !profile.username) { section.style.display = 'none'; return; }
  section.style.display = '';

  document.getElementById('creatorName').textContent = profile.username;

  // Tier badge
  const tierEl = document.getElementById('creatorTier');
  tierEl.textContent = profile.tier;
  tierEl.className = 'creator-tier-badge ' +
    (profile.tier_label === '头部' ? 'head' :
     profile.tier_label === '腰部' ? 'waist' :
     profile.tier_label === '上升' ? 'rising' : 'new');

  // Style tags
  const tags = profile.style_tags || [];
  document.getElementById('creatorStyleTags').innerHTML = tags.map(t =>
    `<span class="l2-chip primary">${escHtml(t)}</span>`
  ).join('');

  // Stats row
  const s = profile.stats || {};
  const spec = profile.specialization || {};
  const parts = [
    `<span>品类专精: <strong>${escHtml(spec.primary || '-')}</strong> (${escHtml(spec.label || '')})</span>`,
    `<span>质量一致性: <strong>${Math.round((profile.quality_consistency || 0) * 100)}%</strong> ${escHtml(profile.consistency_label || '')}</span>`,
    `<span>合作: <strong>${escHtml(profile.collaboration_pattern || '')}</strong></span>`,
    `<span>定价: <strong>${escHtml(profile.pricing_reference || '')}</strong></span>`,
  ];
  document.getElementById('creatorStats').innerHTML = parts.join('');

  // Insights
  const insights = profile.insights || [];
  document.getElementById('creatorInsight').textContent = insights.join(' · ');
  document.getElementById('creatorInsight').style.display = insights.length ? '' : 'none';
}

function renderSimilarWorks(works) {
  const section = document.getElementById('similarSection');
  const list = document.getElementById('similarList');
  if (!works || !works.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';

  list.innerHTML = works.map(w => {
    const cover = w.cover ? `<img class="similar-cover" src="${escHtml(w.cover)}" alt="">` : '<div class="similar-cover"></div>';
    const dur = w.duration ? `${Math.floor(w.duration/60)}'${String(w.duration%60).padStart(2,'0')}"` : '';
    const simPct = Math.round(w.similarity * 100);
    return `
      <div class="similar-card" onclick="viewDetail('${escHtml(w.id)}')">
        ${cover}
        <div class="similar-info">
          <div class="similar-title">${escHtml(w.title)}</div>
          <div class="similar-meta">${escHtml(w.author || '')}${dur ? ' · ' + dur : ''}</div>
        </div>
        <span class="similar-score">${simPct}%</span>
      </div>
    `;
  }).join('');
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTrendBanner(trends) {
  const banner = document.getElementById('trendBanner');
  if (!trends || !trends.insight_text || trends.insight_text === '暂无显著趋势信号') {
    banner.style.display = 'none';
    return;
  }
  banner.style.display = 'flex';

  // Build enriched text
  let html = trends.insight_text;
  // Bold category names and percentages
  html = html.replace(/'([^']+)'/g, '<strong>$1</strong>');

  // Add rising creator count if available
  if (trends.rising_creators && trends.rising_creators.length) {
    const names = trends.rising_creators.slice(0, 3).map(c => c.username).join('、');
    html += ' | 上升创作者: ' + names;
  }

  document.getElementById('trendText').innerHTML = html;
}

function renderSynthesis(synthesis) {
  const section = document.getElementById('synthesisSection');
  if (!synthesis || !synthesis.synthesis) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  document.getElementById('synthesisText').textContent = synthesis.synthesis;

  const insightsEl = document.getElementById('synthesisInsights');
  if (synthesis.insights && synthesis.insights.length) {
    insightsEl.innerHTML = synthesis.insights.map(i =>
      `<div class="synthesis-insight-item"><span class="synthesis-insight-dot"></span>${escHtml(i)}</div>`
    ).join('');
    insightsEl.style.display = 'flex';
  } else {
    insightsEl.style.display = 'none';
  }
}

// ── Favorites ──
async function loadFavorites() {
  const resp = await fetch('/api/favorites');
  const data = await resp.json();
  const list = document.getElementById('favList');
  if (data.videos && data.videos.length > 0) {
    list.innerHTML = data.videos.map(v => {
      v.overall = v.overall || (v.scores && v.scores.overall) || 0;
      return buildVideoCard(v);
    }).join('');
  } else {
    list.innerHTML = `<div class="empty-state"><h3>空空如也</h3><p>在发现页收藏作品，建立你的灵感参考库</p></div>`;
  }
}

async function toggleFav(id) {
  const video = allVideos.find(v => v.id == id);
  if (!video) return;
  const url = video.is_favorite ? '/api/favorites/remove' : '/api/favorites/add';
  const resp = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(video)
  });
  if (resp.ok) {
    video.is_favorite = !video.is_favorite;
    renderVideos();
  }
}

// ── Close modals on overlay click ──
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', function(e) {
    if (e.target === this) closeModals();
  });
});

checkAuth();
