<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-Eye Pro | AI Creative Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #7c5ce7;
    --primary-hover: #9b7ef2;
    --on-primary: #fff;
    --bg: #f5f6fa;
    --surface: #fff;
    --surface-alt: #f0f1f7;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --border: #e2e4eb;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-full: 999px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.02em;
  }
  .brand-dot {
    width: 8px; height: 8px;
    background: var(--primary);
    border-radius: 50%;
  }
  .header-nav {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .header-nav a, .header-nav button {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .header-nav a:hover, .header-nav button:hover { color: var(--primary); background: var(--surface-alt); }
  .header-nav a.active, .header-nav button.active { color: var(--primary); font-weight: 600; }
  .btn-outline {
    border: 1px solid var(--border) !important;
  }
  .btn-primary-sm {
    background: var(--primary) !important;
    color: var(--on-primary) !important;
    font-weight: 600 !important;
  }
  .btn-primary-sm:hover { background: var(--primary-hover) !important; }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface-alt);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    cursor: pointer;
    border: 1px solid var(--border);
  }

  /* ── Main Content ── */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Search Section ── */
  .search-section {
    padding: 32px 0 20px;
  }
  .search-bar {
    display: flex;
    gap: 12px;
    max-width: 720px;
  }
  .search-input {
    flex: 1;
    height: 48px;
    padding: 0 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    box-shadow: var(--shadow);
  }
  .search-input:focus { border-color: var(--primary); }
  .search-btn {
    height: 48px;
    padding: 0 28px;
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .search-btn:hover { background: var(--primary-hover); }

  .quick-filters {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 6px 16px;
    border-radius: var(--radius-full);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
  .filter-chip.active {
    background: var(--primary);
    color: var(--on-primary);
    border-color: var(--primary);
  }

  /* ── Tabs ── */
  .content-tabs {
    display: flex;
    gap: 24px;
    padding: 4px 0 12px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 24px;
  }
  .tab-item {
    padding: 8px 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    position: relative;
    border: none;
    background: none;
  }
  .tab-item.active { color: var(--primary); }
  .tab-item.active::after {
    content: '';
    position: absolute;
    bottom: -14px; left: 0; right: 0;
    height: 2px;
    background: var(--primary);
  }

  /* ── Video Grid ── */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
    padding-bottom: 60px;
  }
  @media (max-width: 860px) {
    .video-grid { grid-template-columns: 1fr; }
  }

  .video-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.2s;
    display: flex;
    flex-direction: column;
  }
  .video-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }

  .card-top {
    position: relative;
    aspect-ratio: 16/9;
    cursor: pointer;
    background: #eaeaea;
  }
  .card-top img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .score-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: var(--shadow);
  }
  .score-val { font-weight: 700; color: var(--primary); font-size: 20px; }
  .score-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }

  .budget-tag {
    position: absolute;
    bottom: 12px; left: 12px;
    background: rgba(0,0,0,0.65);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
  }

  .card-body { padding: 18px; }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .dim-scores {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .dim-item {
    flex: 1;
    text-align: center;
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    padding: 8px 6px;
  }
  .dim-item .dim-label { font-size: 10px; color: var(--text-secondary); margin-bottom: 2px; }
  .dim-item .dim-value { font-size: 16px; font-weight: 700; color: var(--primary); }

  .concept-box {
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 12px;
  }
  .concept-box .concept-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .concept-box .concept-value {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .concept-row {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .concept-row .item-label { font-size: 10px; color: var(--text-secondary); }
  .concept-row .item-value { font-size: 12px; font-weight: 600; margin-top: 2px; }

  .audit-preview {
    background: var(--surface-alt);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    border-left: 3px solid var(--primary);
    margin-bottom: 12px;
  }

  .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    background: var(--surface-alt);
    color: var(--primary);
    border-radius: var(--radius-full);
    border: 1px solid var(--border);
  }

  .card-actions {
    display: flex;
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    gap: 10px;
  }
  .action-btn {
    flex: 1;
    padding: 9px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
  }
  .action-btn:hover { border-color: var(--primary); color: var(--primary); }
  .action-btn.primary {
    background: var(--primary);
    color: var(--on-primary);
    border-color: var(--primary);
  }
  .action-btn.primary:hover { background: var(--primary-hover); }
  .action-btn.fav-active {
    color: #e74c3c;
    border-color: #e74c3c;
    background: #fef5f5;
  }

  /* ── Modals (standard centered) ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-dialog {
    background: var(--surface);
    border-radius: var(--radius-lg);
    width: 440px;
    max-width: 92vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px;
    box-shadow: var(--shadow-lg);
    animation: fadeIn 0.15s ease-out;
  }
  .modal-dialog.wide { width: 760px; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

  .modal-header {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--text-secondary);
  }
  .modal-close:hover { background: var(--surface-alt); }

  .input-group { margin-bottom: 18px; }
  .input-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    display: block;
  }
  .modal-input {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .modal-input:focus { border-color: var(--primary); }

  .modal-btn {
    width: 100%;
    height: 46px;
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-top: 8px;
  }
  .modal-btn:hover { background: var(--primary-hover); }

  /* ── Detail Report ── */
  .detail-scores-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .detail-score-item {
    flex: 1;
    text-align: center;
    background: var(--surface-alt);
    border-radius: var(--radius);
    padding: 14px 10px;
  }
  .detail-score-item .ds-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
  .detail-score-item .ds-value { font-size: 26px; font-weight: 700; color: var(--primary); }

  .detail-scenarios {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .detail-scenario-chip {
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    padding: 6px 14px;
    font-size: 12px;
    border: 1px solid var(--border);
  }
  .detail-scenario-chip .sc-label { color: var(--text-secondary); }
  .detail-scenario-chip .sc-value { font-weight: 700; color: var(--primary); margin-left: 6px; }

  .ecd-report-content { font-size: 14px; line-height: 1.7; color: var(--text); }
  .ecd-report-content h3 { font-size: 16px; color: var(--primary); margin: 22px 0 10px; }
  .ecd-report-content p { margin-bottom: 12px; }
  .ecd-report-content strong { color: var(--primary); }
  .ecd-report-content blockquote {
    background: var(--surface-alt);
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border-left: 4px solid var(--primary);
    margin: 16px 0;
  }

  /* ── Empty State ── */
  .empty-state {
    grid-column: 1 / -1;
    padding: 80px 20px;
    text-align: center;
    color: var(--text-secondary);
  }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; }

  /* ── Loader ── */
  .loader {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Account Card ── */
  .account-card {
    background: var(--surface-alt);
    padding: 20px;
    border-radius: var(--radius);
    margin-bottom: 24px;
    border: 1px solid var(--primary);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .account-card .ac-user { font-size: 18px; font-weight: 700; }
  .account-card .ac-role { font-size: 12px; color: var(--primary); margin-top: 4px; font-weight: 600; }

  .upgrade-list {
    list-style: none;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }
  .upgrade-list li { margin-bottom: 8px; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .header-inner { padding: 0 16px; }
    .container { padding: 0 16px; }
    .search-bar { flex-direction: column; }
    .video-grid { grid-template-columns: 1fr; }
    .modal-dialog { width: auto; margin: 16px; border-radius: var(--radius-lg); }
  }

  /* ── Page Section ── */
  .page-section { display: none; }
  .page-section.active { display: block; }
  .section-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
    padding-top: 28px;
  }
  .section-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-dot"></div>
      C-EYE PRO
    </div>
    <nav class="header-nav">
      <a href="#" class="active" id="navHome">发现</a>
      <a href="#" id="navFavs">参考库</a>
      <a href="#" id="navAccount" class="btn-outline">我的</a>
      <button class="user-avatar" id="profileBtn" title="账户">👤</button>
    </nav>
  </div>
</header>

<div class="container">
  <!-- Home Page -->
  <div class="page-section active" id="homeSection">
    <div class="search-section">
      <div class="search-bar">
        <input type="text" class="search-input" id="searchKw" placeholder="搜索关键词，如：汽车、数码、创意短片...">
        <button class="search-btn" id="btnSearch">开始审计</button>
      </div>
      <div class="quick-filters">
        <div class="filter-chip active" data-industry="">全部行业</div>
        <div class="filter-chip" data-industry="汽车">汽车</div>
        <div class="filter-chip" data-industry="3C数码">3C数码</div>
        <div class="filter-chip" data-industry="美妆">美妆</div>
        <div class="filter-chip" data-industry="食品饮料">食品</div>
        <div class="filter-chip" data-industry="奢侈品">奢侈品</div>
      </div>
    </div>

    <div class="content-tabs" id="categoryTabs" style="display:none;">
      <button class="tab-item active" data-category="ALL">全部结果</button>
      <button class="tab-item" data-category="4A标准商业TVC">4A TVC</button>
      <button class="tab-item" data-category="AIGC概念/视效流">AIGC/视效</button>
      <button class="tab-item" data-category="宏大叙事/微电影流">叙事/微电影</button>
    </div>

    <div class="video-grid" id="videoList">
      <div class="empty-state">
        <h3>即刻开启创意审计</h3>
        <p>输入关键词，体验 D1-D4 多维元数据评分系统</p>
      </div>
    </div>
  </div>

  <!-- Favorites Page -->
  <div class="page-section" id="favSection">
    <div class="section-title">我的收藏</div>
    <div class="section-subtitle">已保存的高商业价值参考案例</div>
    <div class="video-grid" id="favList"></div>
  </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
  <div class="modal-dialog">
    <div class="modal-header">
      <span id="authTitle">登录</span>
      <button class="modal-close" onclick="closeModals()">✕</button>
    </div>
    <div class="input-group">
      <label class="input-label">用户名</label>
      <input type="text" class="modal-input" id="authUsername" placeholder="请输入用户名">
    </div>
    <div class="input-group">
      <label class="input-label">密码</label>
      <input type="password" class="modal-input" id="authPassword" placeholder="请输入密码">
    </div>
    <button class="modal-btn" id="btnAuthSubmit">登录</button>
    <div style="text-align:center; margin-top:16px; font-size:13px; color:var(--text-secondary);">
      没有账号？<span style="color:var(--primary); cursor:pointer; font-weight:600;" id="switchAuth">立即注册</span>
    </div>
  </div>
</div>

<!-- Account Modal -->
<div class="modal-overlay" id="accountModal">
  <div class="modal-dialog">
    <div class="modal-header">
      <span>账户信息</span>
      <button class="modal-close" onclick="closeModals()">✕</button>
    </div>
    <div class="account-card">
      <div>
        <div class="ac-user" id="dispUser">Guest</div>
        <div class="ac-role" id="dispRole">Standard Access</div>
      </div>
      <div style="font-size: 28px;">💎</div>
    </div>
    <div id="upgradeSection" style="display:none;">
      <h3 style="font-size:15px; margin-bottom:12px;">解锁 Pro 权限</h3>
      <ul class="upgrade-list">
        <li>✨ LLM 深度创意审计 (L2级)</li>
        <li>📊 完整商业指标看板</li>
        <li>🚀 优先搜索通道</li>
      </ul>
      <button class="modal-btn" id="btnUpgrade">升级 PRO (￥29.9)</button>
    </div>
    <button class="action-btn" style="width:100%; margin-top:12px; border-color:#e74c3c; color:#e74c3c;" id="btnLogout">退出登录</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-dialog wide">
    <div class="modal-header">
      <span id="detailTitle" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:80%; font-size:16px;">深度审计报告</span>
      <button class="modal-close" onclick="closeModals()">✕</button>
    </div>

    <div id="detailLoading" style="display:none; text-align:center; padding:40px 0;">
      <div class="loader"></div>
      <p style="font-size:13px; color:var(--text-secondary); margin-top:16px;">ECD 正在审片中...</p>
    </div>

    <div id="detailContent">
      <div class="detail-scores-row" id="detailScores">
        <div class="detail-score-item">
          <div class="ds-label">观众接受度</div>
          <div class="ds-value" id="sD1">-</div>
        </div>
        <div class="detail-score-item">
          <div class="ds-label">商业参考</div>
          <div class="ds-value" id="sD2">-</div>
        </div>
        <div class="detail-score-item">
          <div class="ds-label">团队专业</div>
          <div class="ds-value" id="sD3">-</div>
        </div>
        <div class="detail-score-item">
          <div class="ds-label">新鲜度</div>
          <div class="ds-value" id="sD4">-</div>
        </div>
      </div>
      <div class="detail-scenarios" id="detailScenarios"></div>
      <div id="ecdReport" class="ecd-report-content"></div>
      <div style="margin-top: 28px;">
        <a id="playLink" href="#" target="_blank" class="modal-btn" style="display:flex; align-items:center; justify-content:center; gap:8px; text-decoration:none;">
          ▶ 前往新片场播放
        </a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let currentUser = null;
let allVideos = [];
let currentCategory = 'ALL';
let currentIndustry = '';
let isLoginMode = true;

// ── UI Helpers ──
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
}

// ── Navigation ──
document.getElementById('navHome').onclick = (e) => {
  e.preventDefault();
  setActiveNav('navHome');
  document.getElementById('homeSection').classList.add('active');
  document.getElementById('favSection').classList.remove('active');
};
document.getElementById('navFavs').onclick = (e) => {
  e.preventDefault();
  if (!currentUser) { openModal('authModal'); return; }
  setActiveNav('navFavs');
  document.getElementById('homeSection').classList.remove('active');
  document.getElementById('favSection').classList.add('active');
  loadFavorites();
};
document.getElementById('navAccount').onclick = (e) => {
  e.preventDefault();
  if (!currentUser) { openModal('authModal'); return; }
  updateAccountUI();
  openModal('accountModal');
};
document.getElementById('profileBtn').onclick = () => {
  if (!currentUser) openModal('authModal');
  else { updateAccountUI(); openModal('accountModal'); }
};

function setActiveNav(id) {
  document.querySelectorAll('.header-nav a').forEach(a => a.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Auth ──
async function checkAuth() {
  const resp = await fetch('/api/me');
  const data = await resp.json();
  if (data.authenticated) { currentUser = data; updateAccountUI(); }
}
function updateAccountUI() {
  if (currentUser) {
    document.getElementById('dispUser').textContent = currentUser.username;
    document.getElementById('dispRole').textContent = currentUser.is_member ? 'PRO LICENSE' : 'STANDARD ACCESS';
    document.getElementById('upgradeSection').style.display = currentUser.is_member ? 'none' : 'block';
  }
}

document.getElementById('switchAuth').onclick = () => {
  isLoginMode = !isLoginMode;
  document.getElementById('authTitle').textContent = isLoginMode ? '登录' : '注册';
  document.getElementById('btnAuthSubmit').textContent = isLoginMode ? '登录' : '注册';
  document.getElementById('switchAuth').textContent = isLoginMode ? '立即注册' : '返回登录';
};

document.getElementById('btnAuthSubmit').onclick = async () => {
  const username = document.getElementById('authUsername').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  if (!username || !password) return;
  const url = isLoginMode ? '/api/login' : '/api/register';
  const resp = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password})
  });
  const data = await resp.json();
  if (data.error) { alert(data.error); }
  else {
    if (!isLoginMode) { alert('注册成功，请登录'); isLoginMode = true; document.getElementById('switchAuth').click(); }
    else { location.reload(); }
  }
};

document.getElementById('btnLogout').onclick = async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.reload();
};
document.getElementById('btnUpgrade').onclick = async () => {
  const resp = await fetch('/api/upgrade', { method: 'POST' });
  alert((await resp.json()).message);
  location.reload();
};

// ── Search & Filters ──
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentIndustry = chip.dataset.industry;
    if (document.getElementById('searchKw').value.trim()) {
      document.getElementById('btnSearch').click();
    }
  };
});

document.querySelectorAll('.tab-item').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCategory = tab.dataset.category;
    renderVideos();
  };
});

document.getElementById('btnSearch').onclick = async () => {
  const kw = document.getElementById('searchKw').value.trim();
  if (!kw && !currentIndustry) return;
  if (!currentUser) { openModal('authModal'); return; }

  const list = document.getElementById('videoList');
  list.innerHTML = `<div class="empty-state"><div class="loader"></div><p style="margin-top:16px;">L1 引擎分析中...</p></div>`;

  try {
    const params = new URLSearchParams({ kw, industry: currentIndustry });
    const resp = await fetch('/api/search?' + params);
    const data = await resp.json();
    if (data.error) {
      list.innerHTML = `<div class="empty-state"><h3>审计中断</h3><p>${data.error}</p></div>`;
    } else {
      allVideos = data.videos;
      document.getElementById('categoryTabs').style.display = 'flex';
      renderVideos();
    }
  } catch (err) {
    list.innerHTML = `<div class="empty-state"><h3>系统异常</h3><p>${err.message}</p></div>`;
  }
};

// ── Video Card ──
function buildVideoCard(v) {
  const isFav = v.is_favorite;
  const auditText = v.summary || '正在提取创意指纹...';
  const d = v.dimensions || {};
  const overall = v.overall || v.reference_score || 0;
  const D1 = v.D1 || (v.scores && v.scores.D1) || 0;
  const D2 = v.D2 || (v.scores && v.scores.D2) || 0;
  const D3 = v.D3 || (v.scores && v.scores.D3) || 0;
  const D4 = v.D4 || (v.scores && v.scores.D4) || 0;
  const playUrl = v.web_url || `https://www.xinpianchang.com/a${v.id}`;

  return `
    <div class="video-card">
      <div class="card-top" onclick="window.open('${playUrl}', '_blank')">
        <img src="${v.cover}?x-oss-process=image/resize,w_800" alt="${v.title}" loading="lazy">
        <div class="score-badge">
          <span class="score-label">综合</span>
          <span class="score-val">${overall}</span>
        </div>
        <div class="budget-tag">${d.budget || 'B级'}</div>
      </div>
      <div class="card-body">
        <h3 class="card-title">${v.title}</h3>
        <div class="dim-scores">
          <div class="dim-item"><div class="dim-label">观众</div><div class="dim-value">${D1}</div></div>
          <div class="dim-item"><div class="dim-label">商业</div><div class="dim-value">${D2}</div></div>
          <div class="dim-item"><div class="dim-label">团队</div><div class="dim-value">${D3}</div></div>
          <div class="dim-item"><div class="dim-label">新鲜</div><div class="dim-value">${D4}</div></div>
        </div>
        <div class="concept-box">
          <div class="concept-title">资产沉淀 / Concept Asset</div>
          <div class="concept-value">${d.concept_asset || '通用商业叙事'}</div>
          <div class="concept-row">
            <div>
              <div class="item-label">叙事效率 / Hook</div>
              <div class="item-value">${d.efficiency?.hook || '标准'}</div>
            </div>
            <div style="text-align:right;">
              <div class="item-label">核心主创 / Soul</div>
              <div class="item-value">${d.soul || '导演组'}</div>
            </div>
          </div>
        </div>
        <div class="audit-preview">${v.l2_audit ? '✨ ' : ''}${auditText}</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
          <div class="tag-cloud">
            ${(d.synesthesia || []).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <div style="font-size:11px; color:var(--text-secondary);">${d.efficiency?.platform || ''}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="action-btn ${isFav ? 'fav-active' : ''}" onclick="toggleFav('${v.id}')">
          ${isFav ? '★ 已收藏' : '☆ 收藏'}
        </button>
        <button class="action-btn primary" onclick="viewDetail('${v.id}')">深度审计报告</button>
      </div>
    </div>
  `;
}

function renderVideos() {
  const filtered = currentCategory === 'ALL'
    ? allVideos
    : allVideos.filter(v => v.tab_category === currentCategory);
  const list = document.getElementById('videoList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><h3>暂无此类案例</h3><p>尝试切换分类或调整搜索词</p></div>`;
  } else {
    list.innerHTML = filtered.map(buildVideoCard).join('');
  }
}

// ── Detail ──
async function viewDetail(id) {
  if (!currentUser) { openModal('authModal'); return; }
  if (!currentUser.is_member) {
    alert('深度审计报告 (L2级) 为 Pro 专属功能，请升级后查看。');
    openModal('accountModal');
    return;
  }

  const video = allVideos.find(v => v.id == id);
  if (!video) return;

  document.getElementById('detailTitle').textContent = `审计: ${video.title}`;
  document.getElementById('playLink').href = video.web_url || `https://www.xinpianchang.com/a${id}`;
  openModal('detailModal');
  document.getElementById('detailLoading').style.display = 'block';
  document.getElementById('detailContent').style.display = 'none';

  try {
    const params = new URLSearchParams({ id, industry: currentIndustry });
    const resp = await fetch('/api/evaluate?' + params);
    const data = await resp.json();
    if (data.error) { alert(data.error); closeModals(); }
    else {
      const sc = data.score_details || data.scores || {};
      document.getElementById('sD1').textContent = (sc.D1_audience_reception?.score || sc.D1 || '-');
      document.getElementById('sD2').textContent = (sc.D2_commercial_value?.score || sc.D2 || '-');
      document.getElementById('sD3').textContent = (sc.D3_team_professionalism?.score || sc.D3 || '-');
      document.getElementById('sD4').textContent = (sc.D4_freshness?.score || sc.D4 || '-');

      const scLabels = { default: '通用', advertiser: '广告商', creator_learning: '创作学习', latest_discovery: '最新发现' };
      const scenarios = data.scenarios || {};
      document.getElementById('detailScenarios').innerHTML = Object.entries(scenarios).map(([k, v]) =>
        `<div class="detail-scenario-chip"><span class="sc-label">${scLabels[k]||k}</span><span class="sc-value">${v}</span></div>`
      ).join('');

      document.getElementById('ecdReport').innerHTML = marked.parse(data.ecd_report || '暂无审计报告');
      document.getElementById('detailLoading').style.display = 'none';
      document.getElementById('detailContent').style.display = 'block';
    }
  } catch (err) {
    alert('审计失败: ' + err.message);
    closeModals();
  }
}

// ── Favorites ──
async function loadFavorites() {
  const resp = await fetch('/api/favorites');
  const data = await resp.json();
  const list = document.getElementById('favList');
  if (data.videos && data.videos.length > 0) {
    list.innerHTML = data.videos.map(v => {
      v.overall = v.overall || (v.scores && v.scores.overall) || 0;
      return buildVideoCard(v);
    }).join('');
  } else {
    list.innerHTML = `<div class="empty-state"><h3>空空如也</h3><p>在发现页收藏作品，建立你的灵感参考库</p></div>`;
  }
}

async function toggleFav(id) {
  const video = allVideos.find(v => v.id == id);
  if (!video) return;
  const url = video.is_favorite ? '/api/favorites/remove' : '/api/favorites/add';
  const resp = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(video)
  });
  if (resp.ok) {
    video.is_favorite = !video.is_favorite;
    renderVideos();
  }
}

// ── Close modals on overlay click ──
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', function(e) {
    if (e.target === this) closeModals();
  });
});

checkAuth();
</script>
</body>
</html>
